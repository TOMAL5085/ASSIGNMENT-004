<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-[#002d5b] mb-8">Job Application Tracker</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="stat-card total-card">
                <p class="stat-label">Total</p>
                <h2 id="total-count" class="stat-value text-[#002d5b]">8</h2>
            </div>
            <div class="stat-card interview-card">
                <p class="stat-label">Interview</p>
                <h2 id="interview-count" class="stat-value text-green-500">0</h2>
            </div>
            <div class="stat-card rejected-card">
                <p class="stat-label">Rejected</p>
                <h2 id="rejected-count" class="stat-value text-red-500">0</h2>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h3 class="text-xl font-bold text-[#002d5b]">Available Jobs</h3>
                <div class="flex gap-2 mt-4">
                    <button onclick="filterJobs('all')" id="tab-all" class="btn btn-sm px-6 rounded-md active-tab">All</button>
                    <button onclick="filterJobs('interview')" id="tab-interview" class="btn btn-sm px-6 rounded-md bg-white border-gray-200">Interview</button>
                    <button onclick="filterJobs('rejected')" id="tab-rejected" class="btn btn-sm px-6 rounded-md bg-white border-gray-200">Rejected</button>
                </div>
            </div>
            <p class="text-gray-500 font-medium"><span id="section-count">8</span> jobs</p>
        </div>

        <div id="jobs-container" class="space-y-4"></div>

        <div id="empty-state" class="hidden empty-container">
            <img src="jobs.png" alt="No jobs" class="w-24 mb-4 opacity-80">
            <h3 class="text-2xl font-bold text-[#002d5b]">No jobs available</h3>
            <p class="text-gray-500">Check back soon for new job opportunities</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
